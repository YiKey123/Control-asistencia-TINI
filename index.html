<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia Realtime - Elenco</title>
    
    <!-- CSS de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <!-- Librerías para Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --vde: #d4edda; --ama: #fff3cd; --roj: #f8d7da; }
        .estado-asistio { background-color: var(--vde) !important; color: #155724; }
        .estado-permiso { background-color: var(--ama) !important; color: #856404; }
        .estado-falto { background-color: var(--roj) !important; color: #721c24; }
        .table-responsive { max-height: 70vh; overflow-y: auto; border-radius: 8px; }
        th { position: sticky; top: 0; background-color: #f8f9fa !important; z-index: 2; min-width: 110px; }
        .nombre-corto { font-size: 0.85rem; font-weight: bold; line-height: 1.2; }
        .btn-editar-ensayo { font-size: 0.75rem; padding: 2px 6px; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-4">
    <h2 class="text-center mb-4">Control de Asistencia</h2>

    <div class="row g-3 mb-4 align-items-end">
        <div class="col-6 col-md-2">
            <label class="form-label fw-bold">Mes:</label>
            <input type="month" id="filtroMes" class="form-control">
        </div>
        <div class="col-6 col-md-10 d-flex justify-content-end gap-2 flex-wrap">
            <button class="btn btn-outline-secondary" id="btnAbrirElenco">👥 Elenco</button>
            <button class="btn btn-primary" id="btnAbrirRegistro">📅 Nuevo Ensayo</button>
            <button class="btn btn-success" id="btnExportar">Excel</button>
        </div>
    </div>

    <div class="table-responsive shadow bg-white">
        <table class="table table-sm table-bordered text-center align-middle mb-0">
            <thead class="table-light"><tr id="headerNombres"><th>Fecha</th></tr></thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<!-- MODAL REGISTRO / EDICIÓN -->
<div class="modal fade" id="registroModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="tituloModalRegistro">Registrar Ensayo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="date" id="fechaEnsayo" class="form-control mb-3">
                <div class="table-responsive">
                    <table class="table table-sm">
                        <thead><tr><th>Integrante</th><th>Estado</th><th>Hora</th></tr></thead>
                        <tbody id="listaIntegrantesModal"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary w-100" id="btnGuardar">Guardar Asistencia</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL ELENCO -->
<div class="modal fade" id="modalElenco" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Miembros del Elenco</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="input-group mb-3">
                    <input type="text" id="nuevoNombre" class="form-control" placeholder="Nombre completo...">
                    <button class="btn btn-success" id="btnAgregarMiembro">Agregar</button>
                </div>
                <ul class="list-group" id="listaElencoCrud"></ul>
            </div>
        </div>
    </div>
</div>

<!-- JS de Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

<!-- Firebase Module -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDahLtxl19fR0JTQpQvxU8MrxLdmco7_XU",
        authDomain: "asistencia-tini.firebaseapp.com",
        databaseURL: "https://asistencia-tini-default-rtdb.firebaseio.com",
        projectId: "asistencia-tini",
        storageBucket: "asistencia-tini.firebasestorage.app",
        messagingSenderId: "1049723359333",
        appId: "1:1049723359333:web:9046ff4cff059a03dab68c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let modalElencoInstancia, modalRegistroInstancia;
    
    window.addEventListener('DOMContentLoaded', () => {
        modalElencoInstancia = new bootstrap.Modal(document.getElementById('modalElenco'));
        modalRegistroInstancia = new bootstrap.Modal(document.getElementById('registroModal'));

        document.getElementById('btnAbrirElenco').addEventListener('click', () => {
            modalElencoInstancia.show();
        });

        // Limpiar el formulario al crear un Nuevo Ensayo
        document.getElementById('btnAbrirRegistro').addEventListener('click', () => {
            document.getElementById('tituloModalRegistro').innerText = "Registrar Nuevo Ensayo";
            document.getElementById('fechaEnsayo').value = '';
            document.querySelectorAll('.select-estado').forEach(sel => sel.value = "Asistió");
            document.querySelectorAll('.input-hora').forEach(inp => inp.value = "");
            modalRegistroInstancia.show();
        });
    });

    let integrantes = [];
    let datosAsistencia = {};
    const formatearNombre = (full) => full.split(' ').slice(0, 2).join(' ');

    async function cargarConfiguracion() {
        try {
            const snapshot = await get(child(ref(db), 'configuracion/elenco'));
            if (snapshot.exists()) {
                integrantes = snapshot.val() || [];
            } else {
                integrantes = ["Integrante Inicial"];
                await set(ref(db, 'configuracion/elenco'), integrantes);
            }
            actualizarInterfaz();
        } catch (error) {
            console.error(error);
            alert("No se pudo conectar a Firebase.");
        }
    }

    function actualizarInterfaz() {
        const header = document.getElementById('headerNombres');
        header.innerHTML = '<th>Fecha</th>';
        integrantes.forEach(nom => {
            const th = document.createElement('th');
            th.innerHTML = `<div class="nombre-corto">${formatearNombre(nom)}</div>`;
            header.appendChild(th);
        });

        const listModal = document.getElementById('listaIntegrantesModal');
        listModal.innerHTML = '';
        integrantes.forEach(nom => {
            listModal.innerHTML += `
                <tr>
                    <td class="align-middle"><small>${nom}</small></td>
                    <td><select class="form-select form-select-sm select-estado" data-full="${nom}">
                        <option value="Asistió">Asistió</option>
                        <option value="Permiso">Permiso</option>
                        <option value="Faltó">Faltó</option>
                    </select></td>
                    <td><input type="time" class="form-control form-control-sm input-hora" data-full="${nom}"></td>
                </tr>`;
        });

        const crudList = document.getElementById('listaElencoCrud');
        crudList.innerHTML = '';
        integrantes.forEach((nom, index) => {
            crudList.innerHTML += `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>${nom}</span>
                    <div>
                        <button class="btn btn-sm btn-warning btn-editar-miembro" data-index="${index}">✏️</button>
                        <button class="btn btn-sm btn-danger btn-borrar" data-index="${index}">×</button>
                    </div>
                </li>`;
        });
        cargarDatos();
    }

    // Agregar Miembro
    document.getElementById('btnAgregarMiembro').addEventListener('click', async () => {
        const nom = document.getElementById('nuevoNombre').value.trim();
        if(!nom) return;
        integrantes.push(nom);
        await set(ref(db, 'configuracion/elenco'), integrantes);
        document.getElementById('nuevoNombre').value = '';
        actualizarInterfaz();
    });

    // Delegación de eventos para botones dinámicos (Borrar/Editar Miembro y Editar Ensayo)
    document.addEventListener('click', async (e) => {
        
        // BORRAR MIEMBRO
        if(e.target.closest('.btn-borrar')){
            if(confirm("¿Seguro que deseas eliminar a esta persona del elenco?")){
                const index = e.target.closest('.btn-borrar').getAttribute('data-index');
                integrantes.splice(index, 1);
                await set(ref(db, 'configuracion/elenco'), integrantes);
                actualizarInterfaz();
            }
        }

        // EDITAR MIEMBRO
        if(e.target.closest('.btn-editar-miembro')){
            const index = e.target.closest('.btn-editar-miembro').getAttribute('data-index');
            const nombreViejo = integrantes[index];
            const nombreNuevo = prompt("Edita el nombre:", nombreViejo);
            
            if(nombreNuevo && nombreNuevo.trim() !== "" && nombreNuevo !== nombreViejo) {
                integrantes[index] = nombreNuevo.trim();
                await set(ref(db, 'configuracion/elenco'), integrantes);
                actualizarInterfaz();
            }
        }

        // EDITAR ENSAYO (Abre el modal con los datos cargados)
        if(e.target.closest('.btn-editar-ensayo')){
            const fecha = e.target.closest('.btn-editar-ensayo').getAttribute('data-fecha');
            const ensayo = datosAsistencia[fecha];
            
            document.getElementById('tituloModalRegistro').innerText = `Editar Ensayo: ${fecha}`;
            document.getElementById('fechaEnsayo').value = fecha;

            // Rellenar los datos de cada integrante
            document.querySelectorAll('.select-estado').forEach(sel => {
                const nom = sel.getAttribute('data-full');
                const cleanNom = nom.replace(/[.#$/[\]]/g, "_");
                const info = ensayo.detalle[cleanNom];
                const inputHora = document.querySelector(`.input-hora[data-full="${nom}"]`);
                
                if(info) {
                    sel.value = info.estado;
                    inputHora.value = info.hora || "";
                } else {
                    sel.value = "Faltó"; // Valor por defecto si es alguien nuevo
                    inputHora.value = "";
                }
            });

            modalRegistroInstancia.show();
        }
    });

    // Guardar Asistencia (Sirve para crear y actualizar)
    document.getElementById('btnGuardar').addEventListener('click', async () => {
        const fecha = document.getElementById('fechaEnsayo').value;
        if(!fecha) return alert("Selecciona fecha");

        const registro = { fecha, detalle: {} };
        document.querySelectorAll('.select-estado').forEach(sel => {
            const nom = sel.getAttribute('data-full');
            const hora = document.querySelector(`.input-hora[data-full="${nom}"]`).value;
            registro.detalle[nom.replace(/[.#$/[\]]/g, "_")] = { estado: sel.value, hora: sel.value === "Asistió" ? hora : "" };
        });

        const mesRuta = fecha.substring(0, 7);
        await set(ref(db, `ensayos/${mesRuta}/${fecha}`), registro);
        
        modalRegistroInstancia.hide();
        cargarDatos();
    });

    async function cargarDatos() {
        const mes = document.getElementById('filtroMes').value;
        const snapshot = await get(ref(db, `ensayos/${mes}`));
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = '';

        if (snapshot.exists()) {
            const ensayos = snapshot.val();
            Object.keys(ensayos).sort().reverse().forEach(fechaKey => {
                const ensayo = ensayos[fechaKey];
                const tr = document.createElement('tr');
                
                // Columna de la fecha con el botón de Editar
                tr.innerHTML = `
                    <td>
                        <div class="d-flex flex-column align-items-center">
                            <strong>${ensayo.fecha}</strong>
                            <button class="btn btn-outline-primary btn-editar-ensayo mt-1" data-fecha="${ensayo.fecha}">✏️ Editar</button>
                        </div>
                    </td>`;
                
                integrantes.forEach(nom => {
                    const cleanNom = nom.replace(/[.#$/[\]]/g, "_");
                    const info = ensayo.detalle[cleanNom] || { estado: "Faltó", hora: "" };
                    const td = document.createElement('td');
                    if(info.estado === "Asistió") {
                        td.className = "estado-asistio";
                        td.innerHTML = `✔<br><small>${info.hora}</small>`;
                    } else if(info.estado === "Permiso") {
                        td.className = "estado-permiso";
                        td.textContent = "P";
                    } else {
                        td.className = "estado-falto";
                        td.textContent = "✘";
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            datosAsistencia = ensayos;
        } else {
            datosAsistencia = {};
        }
    }

    document.getElementById('btnExportar').addEventListener('click', async () => {
        const wb = new ExcelJS.Workbook();
        const ws = wb.addWorksheet('Asistencia');
        const mes = document.getElementById('filtroMes').value;
        ws.addRow(['Fecha', ...integrantes]);
        Object.keys(datosAsistencia).sort().forEach(fecha => {
            const ensayo = datosAsistencia[fecha];
            const fila = [ensayo.fecha];
            integrantes.forEach(nom => {
                const cleanNom = nom.replace(/[.#$/[\]]/g, "_");
                const info = ensayo.detalle[cleanNom] || { estado: "Faltó", hora: "" };
                fila.push(info.estado === "Asistió" ? `Asistió (${info.hora})` : info.estado);
            });
            const row = ws.addRow(fila);
            row.eachCell((cell, col) => {
                if(col > 1) {
                    if(cell.value && cell.value.toString().includes("Asistió")) cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFC6EFCE'}};
                    if(cell.value === "Permiso") cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFFFEB9C'}};
                    if(cell.value === "Faltó") cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFFFC7CE'}};
                }
            });
        });
        const buf = await wb.xlsx.writeBuffer();
        saveAs(new Blob([buf]), `Asistencia_${mes}.xlsx`);
    });

    document.getElementById('filtroMes').value = new Date().toISOString().substring(0, 7);
    document.getElementById('filtroMes').addEventListener('change', cargarDatos);
    
    cargarConfiguracion();
</script>
</body>
</html>
